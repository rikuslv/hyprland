[manager]
ratio          = [1, 3, 4]
sort_by        = "natural"
show_hidden    = false

[opener]
# Define Vim with 'block = true' for interactive terminal use
edit = [
    { run = 'vim "$@"', block = true, desc = "Vim" }
]
# Define system default opener
open = [
    { run = 'xdg-open "$@"', desc = "Open" }
]

[open]
# Using prepend_rules ensures your config takes priority over defaults
prepend_rules = [
    # Open directories
    { name = "*/", use = [ "open" ] },
    # Open text files (like your php_run.txt) with Vim
    { mime = "text/*", use = [ "edit" ] },
    # Open images/PDFs with system default
    { mime = "image/*", use = [ "open" ] },
    { mime = "application/pdf", use = [ "open" ] },
    # Catch-all rule for any other file
    { name = "*", use = [ "edit" ] }
]
